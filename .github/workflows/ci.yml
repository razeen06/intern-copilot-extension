name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Extension tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - run: npm test
      - name: Validate manifest JSON
        run: node -e 'JSON.parse(require("node:fs").readFileSync("manifest.json", "utf8"))'
